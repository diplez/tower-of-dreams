name: 🏗️ Tower of Dreams CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-ci
  EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

jobs:
  # ═══════════════════════════════════════
  # Job 1: Lint & Type Check
  # ═══════════════════════════════════════
  typecheck:
    name: 🔍 TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript compile check
        run: npx tsc --noEmit --pretty
        continue-on-error: true

      - name: Check for critical type errors
        run: |
          echo "🔍 Checking critical files for syntax errors..."
          npx tsc --noEmit --pretty 2>&1 | head -50 || true
          echo "✅ Type check complete"

  # ═══════════════════════════════════════
  # Job 2: Build Web + Artifact
  # ═══════════════════════════════════════
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Export web build
        run: npx expo export --platform web

      - name: Verify web output
        run: |
          if [ -d "dist" ]; then
            echo "✅ Web build output found"
            echo ""
            echo "📊 Build stats:"
            echo "  Files: $(find dist -type f | wc -l)"
            echo "  Total size: $(du -sh dist | cut -f1)"
            echo ""
            ls -la dist/
          else
            echo "❌ Web build failed - dist/ not found"
            exit 1
          fi

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tower-of-dreams-web-${{ github.sha }}
          path: dist/
          retention-days: 30
          if-no-files-found: error

  # ═══════════════════════════════════════
  # Job 2b: Deploy-ready package
  # ═══════════════════════════════════════
  package-release:
    name: 📦 Package Release
    runs-on: ubuntu-latest
    needs: [typecheck, build-web, validate-structure, validate-sql, audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npx expo export --platform web

      - name: Generate build info
        run: |
          cat > dist/build-info.json << EOF
          {
            "project": "Tower of Dreams",
            "version": "$(node -e "console.log(require('./package.json').version)")",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "buildDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "buildNumber": "${{ github.run_number }}",
            "nodeVersion": "$(node -v)",
            "expoVersion": "$(npx expo --version)"
          }
          EOF
          echo "📋 Build info:"
          cat dist/build-info.json

      - name: Create deploy package
        run: |
          mkdir -p release

          # Web deploy package (Vercel / Netlify / static hosting)
          cd dist
          tar -czf ../release/tower-of-dreams-web-v$(node -e "console.log(require('../package.json').version)")-build${{ github.run_number }}.tar.gz .
          cd ..

          # Source package (for review / mobile builds)
          tar --exclude='node_modules' \
              --exclude='.git' \
              --exclude='.expo' \
              --exclude='dist' \
              --exclude='release' \
              -czf release/tower-of-dreams-source-v$(node -e "console.log(require('./package.json').version)")-build${{ github.run_number }}.tar.gz .

          # SQL migration package
          cp supabase/migrations/001_initial_schema.sql release/

          # Generate deploy instructions
          cat > release/DEPLOY.md << 'DEPLOYEOF'
          # 🚀 Tower of Dreams — Deploy Guide

          ## Web Deploy (Vercel)

          ### Option A: Auto-deploy from GitHub
          1. Go to vercel.com → New Project → Import `diplez/tower-of-dreams`
          2. Set environment variables:
             - `EXPO_PUBLIC_SUPABASE_URL`
             - `EXPO_PUBLIC_SUPABASE_ANON_KEY`
             - `EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY`
          3. Deploy!

          ### Option B: Manual deploy from this artifact
          1. Extract `tower-of-dreams-web-*.tar.gz`
          2. Upload `dist/` contents to any static hosting
          3. Configure environment variables

          ## Database Setup
          1. Create project on supabase.com
          2. Go to SQL Editor
          3. Run `001_initial_schema.sql`
          4. Copy project URL and anon key to env vars

          ## Mobile (Future)
          ```bash
          # Install EAS CLI
          npm install -g eas-cli

          # Build for iOS
          eas build --platform ios

          # Build for Android
          eas build --platform android
          ```
          DEPLOYEOF

          echo ""
          echo "📦 Release package contents:"
          ls -lh release/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: tower-of-dreams-release-build${{ github.run_number }}
          path: release/
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## 🏗️ Tower of Dreams — Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **Web build** — Static files ready for Vercel/Netlify" >> $GITHUB_STEP_SUMMARY
          echo "- **Source package** — Full source for mobile builds" >> $GITHUB_STEP_SUMMARY
          echo "- **SQL schema** — Database migration file" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy guide** — Step-by-step instructions" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════
  # Job 3: Project Structure Validation
  # ═══════════════════════════════════════
  validate-structure:
    name: 📁 Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "📁 Validating project structure..."
          
          REQUIRED_FILES=(
            "app.json"
            "package.json"
            "tsconfig.json"
            ".env.example"
            ".gitignore"
            "app/_layout.tsx"
            "app/(tabs)/_layout.tsx"
            "app/(tabs)/tower.tsx"
            "app/(tabs)/shop.tsx"
            "app/(tabs)/rankings.tsx"
            "app/(tabs)/chat.tsx"
            "app/(tabs)/profile.tsx"
            "app/auth/_layout.tsx"
            "app/auth/login.tsx"
            "app/auth/register.tsx"
            "app/floor/_layout.tsx"
            "app/floor/build.tsx"
            "components/ui/index.tsx"
            "components/tower/FloorList.tsx"
            "lib/supabase.ts"
            "lib/store.ts"
            "constants/game.ts"
            "types/index.ts"
            "supabase/migrations/001_initial_schema.sql"
          )

          MISSING=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ MISSING: $file"
              MISSING=$((MISSING + 1))
            fi
          done

          echo ""
          if [ $MISSING -eq 0 ]; then
            echo "🎉 All ${#REQUIRED_FILES[@]} required files present!"
          else
            echo "⚠️ $MISSING file(s) missing!"
            exit 1
          fi

      - name: Check no secrets committed
        run: |
          echo "🔒 Checking for leaked secrets..."
          
          FOUND=0
          # Check for .env file (should not be committed)
          if [ -f ".env" ]; then
            echo "  ❌ .env file found in repo!"
            FOUND=1
          fi
          
          # Check for hardcoded keys in source
          if grep -r "sk_live_" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null; then
            echo "  ❌ Stripe live key found in source!"
            FOUND=1
          fi
          
          if grep -r "supabase_service_role" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null; then
            echo "  ❌ Supabase service role key found in source!"
            FOUND=1
          fi

          if [ $FOUND -eq 0 ]; then
            echo "  ✅ No secrets detected"
          else
            exit 1
          fi

      - name: Verify .gitignore
        run: |
          echo "🛡️ Checking .gitignore..."
          
          REQUIRED_IGNORES=("node_modules" ".env" "dist" ".expo")
          
          for pattern in "${REQUIRED_IGNORES[@]}"; do
            if grep -q "$pattern" .gitignore; then
              echo "  ✅ $pattern is ignored"
            else
              echo "  ⚠️ $pattern NOT in .gitignore"
            fi
          done

  # ═══════════════════════════════════════
  # Job 4: SQL Schema Validation
  # ═══════════════════════════════════════
  validate-sql:
    name: 🗄️ Validate SQL Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SQL schema structure
        run: |
          SCHEMA="supabase/migrations/001_initial_schema.sql"
          echo "🗄️ Validating SQL schema..."
          
          REQUIRED_TABLES=("profiles" "wallets" "floors" "contributions" "payments" "messages" "badges" "tower_state" "animation_events")
          REQUIRED_FUNCTIONS=("get_biome" "get_animation_level" "contribute_to_floor" "handle_new_user" "calculate_tier")
          
          MISSING=0
          
          echo ""
          echo "Tables:"
          for table in "${REQUIRED_TABLES[@]}"; do
            if grep -q "CREATE TABLE.*$table" "$SCHEMA"; then
              echo "  ✅ $table"
            else
              echo "  ❌ MISSING: $table"
              MISSING=$((MISSING + 1))
            fi
          done
          
          echo ""
          echo "Functions:"
          for func in "${REQUIRED_FUNCTIONS[@]}"; do
            if grep -q "CREATE.*FUNCTION.*$func" "$SCHEMA"; then
              echo "  ✅ $func()"
            else
              echo "  ❌ MISSING: $func()"
              MISSING=$((MISSING + 1))
            fi
          done
          
          echo ""
          echo "Security:"
          RLS_COUNT=$(grep -c "ENABLE ROW LEVEL SECURITY" "$SCHEMA" || true)
          POLICY_COUNT=$(grep -c "CREATE POLICY" "$SCHEMA" || true)
          echo "  📊 RLS enabled on $RLS_COUNT tables"
          echo "  📊 $POLICY_COUNT policies defined"
          
          if [ "$RLS_COUNT" -lt 5 ]; then
            echo "  ⚠️ Expected RLS on at least 5 tables"
          else
            echo "  ✅ RLS coverage looks good"
          fi
          
          echo ""
          echo "Seed data:"
          if grep -q "INSERT INTO.*tower_state" "$SCHEMA" && grep -q "INSERT INTO.*floors" "$SCHEMA"; then
            echo "  ✅ Tower state + first floor seeded"
          else
            echo "  ❌ Missing seed data"
            MISSING=$((MISSING + 1))
          fi
          
          echo ""
          if [ $MISSING -eq 0 ]; then
            echo "🎉 SQL schema validation passed!"
          else
            echo "⚠️ $MISSING issue(s) found"
            exit 1
          fi

  # ═══════════════════════════════════════
  # Job 5: Dependencies Audit
  # ═══════════════════════════════════════
  audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --production --audit-level=high || true

      - name: Check dependency count
        run: |
          DEPS=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.dependencies || {}).length)")
          DEV_DEPS=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.devDependencies || {}).length)")
          echo "📦 Dependencies: $DEPS production, $DEV_DEPS dev"
          
          if [ "$DEPS" -gt 50 ]; then
            echo "⚠️ High dependency count - consider auditing"
          else
            echo "✅ Dependency count is reasonable"
          fi
